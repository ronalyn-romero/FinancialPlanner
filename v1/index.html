<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Financial Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --sidebar-bg: #0a0a0a;
            --card-bg: #121212;
            --primary-accent: #341539;
            --secondary-accent: #8e4585;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: #1f1f1f;
            --subtle-border: rgba(52, 21, 57, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(52, 21, 57, 0.15), transparent 50%);
        }

        /* Sidebar Styling */
        .sidebar {
            width: 80px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
            z-index: 10;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--secondary-accent), var(--primary-accent));
            border-radius: 10px;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(142, 69, 133, 0.3);
        }

        .nav-items {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            align-items: center;
        }

        .nav-item {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-item:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            color: var(--text-main);
            background: var(--primary-accent);
            border: 1px solid var(--secondary-accent);
            box-shadow: 0 0 15px rgba(52, 21, 57, 0.5);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2.5rem 3rem;
            overflow-y: auto;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .reset-btn:hover {
            color: var(--text-main);
            border-color: var(--subtle-border);
            background: rgba(52, 21, 57, 0.2);
        }

        /* View Toggles */
        .view-section {
            display: none;
            flex-direction: column;
            animation: fadeIn 0.4s ease;
        }

        .view-section.active {
            display: flex;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.8rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: transparent;
            transition: background 0.3s ease;
        }

        .card:hover {
            border-color: var(--subtle-border);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card:hover::before {
            background: linear-gradient(90deg, var(--primary-accent), var(--secondary-accent));
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .card-title {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .card-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(52, 21, 57, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--secondary-accent);
        }

        .card-value {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .currency {
            color: var(--text-muted);
            font-size: 1.4rem;
            font-weight: 400;
        }

        /* Transactions Section */
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .transactions-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            flex: 1;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 2rem;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
        }

        .empty-title {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.2);
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .col-desc {
            font-weight: 500;
        }

        .col-cat {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .col-time {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .amount-income {
            color: #4ade80;
        }

        .amount-expense {
            color: #f87171;
        }

        .amount-savings {
            color: #60a5fa;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.3rem 0.8rem;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(142, 69, 133, 0.15);
            color: #e0b0ff;
            border: 1px solid rgba(142, 69, 133, 0.3);
        }

        /* Dual FAB Container */
        .fab-container {
            position: fixed;
            bottom: 2.5rem;
            right: 2.5rem;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1.5rem;
        }

        .fab-row {
            display: flex;
            align-items: flex-end;
            gap: 1rem;
            position: relative;
        }

        /* Shared Glassmorphism Pop-ups */
        .glass-popup {
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--subtle-border);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 25px rgba(52, 21, 57, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: absolute;
            right: 70px;
            bottom: 0;
            transform-origin: bottom right;
            transform: translateX(20px) scale(0.95);
        }

        .glass-popup.open {
            opacity: 1;
            transform: translateX(0) scale(1);
            pointer-events: all;
        }

        /* AI Bubble Specifics */
        .ai-bubble {
            padding: 1.5rem;
            width: 340px;
            border-bottom-right-radius: 4px;
        }

        /* Manual Menu Specifics */
        .manual-menu {
            padding: 1rem;
            width: 300px;
            border-bottom-right-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .ai-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary-accent), var(--primary-accent));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(142, 69, 133, 0.5);
        }

        .ai-greeting {
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .command-input-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(142, 69, 133, 0.3);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .command-input-wrapper:focus-within {
            border-color: var(--secondary-accent);
            box-shadow: inset 0 0 15px rgba(142, 69, 133, 0.2);
        }

        .command-input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
        }

        .command-input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.85rem;
        }

        /* Manual Options */
        .manual-option {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .manual-option:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .manual-option.active {
            background: rgba(52, 21, 57, 0.3);
            border-color: var(--secondary-accent);
        }

        .manual-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .manual-form {
            display: none;
            flex-direction: column;
            gap: 0.8rem;
            padding: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 0.5rem;
            animation: slideDown 0.3s ease forwards;
        }

        .manual-form.show {
            display: flex;
        }

        .amount-input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .amount-symbol {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 500;
        }

        .amount-input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.2rem;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-size: 1.1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .amount-input:focus {
            border-color: var(--secondary-accent);
            box-shadow: inset 0 0 10px rgba(142, 69, 133, 0.2);
        }

        .desc-input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .desc-input:focus {
            border-color: var(--secondary-accent);
        }

        .submit-btn {
            background: var(--primary-accent);
            color: white;
            border: 1px solid var(--secondary-accent);
            padding: 0.8rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .submit-btn:hover {
            background: var(--secondary-accent);
            box-shadow: 0 4px 15px rgba(142, 69, 133, 0.4);
        }

        /* FAB Buttons */
        .fab-button {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--text-main);
            position: relative;
        }

        .fab-button:hover {
            transform: scale(1.05);
            border-color: var(--subtle-border);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(142, 69, 133, 0.2);
        }

        .fab-button.active {
            background: var(--primary-accent);
            border-color: var(--secondary-accent);
            color: #ffffff;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7), 0 0 30px rgba(142, 69, 133, 0.6);
        }

        .fab-button.active svg {
            transform: rotate(45deg);
        }

        .fab-button svg {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* AI FAB Magic Glow */
        .fab-ai {
            background: var(--primary-accent);
            border-color: var(--secondary-accent);
            color: #ffffff;
        }

        .fab-ai::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(142, 69, 133, 0.8), rgba(52, 21, 57, 0.2));
            z-index: -1;
            filter: blur(8px);
            opacity: 0.6;
            transition: opacity 0.3s ease;
            animation: pulse-glow 3s infinite;
        }

        .fab-ai:hover::after,
        .fab-ai.active::after {
            opacity: 1;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border-left: 3px solid var(--secondary-accent);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Animations */
        @keyframes pulse-glow {
            0% {
                opacity: 0.6;
                box-shadow: 0 0 20px rgba(142, 69, 133, 0.3);
            }

            50% {
                opacity: 1;
                box-shadow: 0 0 35px rgba(142, 69, 133, 0.6);
            }

            100% {
                opacity: 0.6;
                box-shadow: 0 0 20px rgba(142, 69, 133, 0.3);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .new-row {
            animation: slideIn 0.4s ease forwards;
        }

        /* Goal Drawer */
        .goal-drawer {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100vh;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-color);
            z-index: 200;
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .goal-drawer.open {
            right: 0;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .drawer-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .drawer-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .drawer-close:hover {
            color: var(--text-main);
        }

        .goal-input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .goal-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .goal-input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .goal-input:focus {
            border-color: var(--secondary-accent);
        }

        .goal-progress-container {
            margin-top: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1.2rem;
            border: 1px solid var(--border-color);
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary-accent), var(--primary-accent));
            width: 0%;
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .drawer-save-btn {
            margin-top: auto;
            background: var(--primary-accent);
            color: white;
            border: 1px solid var(--secondary-accent);
            padding: 1rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .drawer-save-btn:hover {
            background: var(--secondary-accent);
            box-shadow: 0 4px 15px rgba(142, 69, 133, 0.4);
        }

        /* Goal Management & Confirm Modal */
        .goal-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            max-height: 60vh;
            padding-right: 0.5rem;
        }

        .goal-list::-webkit-scrollbar {
            width: 4px;
        }

        .goal-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .goal-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1.2rem;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s;
        }

        .goal-card:hover {
            border-color: var(--subtle-border);
        }

        .goal-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .goal-card-title {
            font-weight: 600;
            color: var(--text-main);
            font-size: 1rem;
        }

        .delete-icon {
            background: transparent;
            border: none;
            color: var(--text-muted);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.2rem;
            border-radius: 4px;
            opacity: 0.6;
        }

        .delete-icon:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            opacity: 1;
        }

        .add-goal-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-top: 0.5rem;
            animation: slideDown 0.3s ease;
        }

        /* Confirmation Modal */
        .confirm-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .confirm-modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .confirm-modal-content {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .confirm-modal-overlay.active .confirm-modal-content {
            transform: translateY(0);
        }

        .confirm-title {
            color: var(--text-main);
            margin-bottom: 0.8rem;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .confirm-message {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .confirm-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .confirm-btn {
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            flex: 1;
            font-size: 0.95rem;
        }

        .cancel-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .delete-btn {
            background: #ab3030;
            color: white;
            border: 1px solid #dc2626;
        }

        .delete-btn:hover {
            background: #dc2626;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        /* Generic utilities */
        .clickable {
            cursor: pointer;
        }

        #btn-dashboard,
        #btn-transactions,
        #btn-goals,
        #closeDrawerBtn {
            pointer-events: auto;
            cursor: pointer;
        }

        .nav-item svg,
        .drawer-close svg,
        .fab-button svg,
        .reset-btn svg {
            pointer-events: none;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="logo clickable">F</div>
        <div class="nav-items">
            <div class="nav-item active clickable" id="btn-dashboard" title="Dashboard">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="9" rx="1"></rect>
                    <rect x="14" y="3" width="7" height="5" rx="1"></rect>
                    <rect x="14" y="12" width="7" height="9" rx="1"></rect>
                    <rect x="3" y="16" width="7" height="5" rx="1"></rect>
                </svg>
            </div>
            <div class="nav-item clickable" id="btn-transactions" title="Transactions">

                    <line x1="8" y1="12" x2="21" y2="12"></line>
                    <line x1="8" y1="18" x2="21" y2="18"></line>
                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                    <line x1="3" y1="12" x2="3.01" y2="12"></line>

                </svg>

    <main class="main-content">
        <header class="header">
            <h1 id="pageTitle">Overview</h1>

            <select id="currencySelect"
                style="margin-left:auto; margin-right:10px; padding:4px 8px; border-radius:6px; background:#111; color:white; border:1px solid rgba(255,255,255,0.1);">

            <button class="reset-btn clickable" id="resetBtn">

                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>

        <!-- Dashboard View -->
        <div id="viewDashboard" class="view-section active">
            <section class="cards-grid">
                <div class="card">

                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Total Income</span>
                        <div class="card-icon" style="color: #4ade80; background: rgba(74, 222, 128, 0.1);">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Savings Goal</span>
                        <div class="card-icon" style="color: #60a5fa; background: rgba(96, 165, 250, 0.1);">

                    <div class="card-value">

            <section class="transactions-section">
                <h2 class="section-title">Recent Transactions</h2>

        <!-- Full Table View -->
        <div id="viewTable" class="view-section">

    </main>

    <!-- Goal Drawer -->
    <div class="goal-drawer" id="goal-drawer">

                    stroke-linecap="round" stroke-linejoin="round">

        <div class="goal-list" id="goalListContainer">
            <!-- Goal cards injected by JS -->
        </div>

        <button class="drawer-save-btn clickable" id="showAddGoalBtn"

    <div class="fab-container">
        <!-- Manual Entry Row -->
        <div class="fab-row">
            <div class="glass-popup manual-menu" id="manualBubble">
                <div class="manual-option" data-type="income" onclick="selectManualCategory('income')">
                    <div class="manual-icon" style="background: rgba(74, 222, 128, 0.1); color: #4ade80;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"

                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                            <polyline points="17 18 23 18 23 12"></polyline>

                </div>
                <div class="manual-option" data-type="savings" onclick="selectManualCategory('savings')">

                <div class="manual-form" id="manualForm">

                        <input type="number" id="manualAmount" class="amount-input" placeholder="0.00" step="0.01">

                    <input type="text" id="manualDesc" class="desc-input" placeholder="Description (Optional)">

            <div class="fab-button" id="fabManual" title="Manual Add">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>

        <!-- AI Assistant Row -->
        <div class="fab-row">
            <div class="glass-popup ai-bubble" id="aiBubble">
                <div class="ai-header">
                    <div class="ai-avatar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48 2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48 2.83-2.83">
                            </path>
                        </svg>
                    </div>
                    <div class="ai-greeting">How can I help you?</div>

                <div class="command-input-wrapper">

                        placeholder="e.g. 'spent 50 on coffee', 'income 5000'..." autocomplete="off">

            <div class="fab-button fab-ai clickable" id="fabAI" title="Ask Assistant">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"></path>
                    <path d="m9 10 2-2 4 4-2 2-4-4"></path>
                </svg>
            </div>
        </div>

    <div id="toast" class="toast">
        <span id="toastMessage">Action completed</span>
    </div>

    <script>
        // DOM Elements
        const balanceEl = document.getElementById('balanceValue');
        const incomeEl = document.getElementById('incomeValue');
        const expensesEl = document.getElementById('expensesValue');
        const savingsEl = document.getElementById('savingsValue');

        // Currency Settings
        let currencySymbol = localStorage.getItem("currencySymbol") || "$";

        const currencySelect = document.getElementById("currencySelect");

        if (currencySelect) {
            currencySelect.value = currencySymbol;

            currencySelect.addEventListener("change", () => {
                currencySymbol = currencySelect.value;
                localStorage.setItem("currencySymbol", currencySymbol);
                location.reload();

            });
        }

        const currencyDisplays = document.querySelectorAll('.currency');

        currencyDisplays.forEach(el => {
            el.textContent = currencySymbol;
        });

        const commandInput = document.getElementById('commandInput');
        const resetBtn = document.getElementById('resetBtn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const dashTransactionsContainer = document.getElementById('dashTransactionsContainer');
        const fullTransactionsContainer = document.getElementById('fullTransactionsContainer');

        // Popup Elements
        const fabAI = document.getElementById('fabAI');
        const aiBubble = document.getElementById('aiBubble');
        const fabManual = document.getElementById('fabManual');
        const manualBubble = document.getElementById('manualBubble');
        const manualForm = document.getElementById('manualForm');
        const manualAmount = document.getElementById('manualAmount');
        const manualDesc = document.getElementById('manualDesc');

        // Nav and View Elements
        const viewDashboard = document.getElementById('viewDashboard');
        const viewTable = document.getElementById('viewTable');
        const pageTitle = document.getElementById('pageTitle');

        // Goal Drawer Elements
        const showAddGoalBtn = document.getElementById('showAddGoalBtn');
        const goalListContainer = document.getElementById('goalListContainer');

        let selectedManualCategory = null;
        let pendingConfirmAction = null;

        // State
        let state = {
            income: 0,
            expenses: 0,
            savings: 0,
            transactions: [],
            goals: []
        };

        // Initialize from localStorage
        function loadState() {
            const savedState = localStorage.getItem('saas_dashboard_state');
            if (savedState) {
                try {
                    // merge so we don't lose new fields if older state
                    state = { ...state, ...JSON.parse(savedState) };
                    state.transactions.forEach(t => {
                        if (!t.id) t.id = Date.now() + Math.random();
                    });
                    if (!state.goals || state.goals.length === 0) {
                        state.goals = [
                            { id: Date.now(), name: state.goalName || "Main Savings", target: state.goalTarget || 10000 }
                        ];
                    }
                } catch (e) {
                    console.error('Error parsing state from localStorage', e);
                }
            } else {
                state.goals = [{ id: Date.now(), name: "Main Savings", target: 10000 }];
            }
            updateCards(false);
            renderTransactions();
            updateGoalDrawerUI();
        }

        // Save to localStorage
        function saveState() {
            localStorage.setItem('saas_dashboard_state', JSON.stringify(state));
            updateGoalDrawerUI();
        }

        // Format number with commas
        function formatNumber(num) {
            return num.toLocaleString('en-US', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            });
        }

        // Count up animation
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 4); // easeOutQuart
                const current = start + (end - start) * ease;
                obj.innerText = formatNumber(current);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerText = formatNumber(end);
                }
            };
            window.requestAnimationFrame(step);
        }

        // Update Card values
        function updateCards(animate = true) {
            const currentBalance = parseFloat(balanceEl.innerText.replace(/,/g, '')) || 0;
            const currentIncome = parseFloat(incomeEl.innerText.replace(/,/g, '')) || 0;
            const currentExpenses = parseFloat(expensesEl.innerText.replace(/,/g, '')) || 0;
            const currentSavings = parseFloat(savingsEl.innerText.replace(/,/g, '')) || 0;

            const targetBalance = state.income - state.expenses;

            if (animate) {
                if (currentBalance !== targetBalance) animateValue(balanceEl, currentBalance, targetBalance, 800);
                if (currentIncome !== state.income) animateValue(incomeEl, currentIncome, state.income, 800);
                if (currentExpenses !== state.expenses) animateValue(expensesEl, currentExpenses, state.expenses, 800);
                if (currentSavings !== state.savings) animateValue(savingsEl, currentSavings, state.savings, 800);
            } else {
                balanceEl.innerText = formatNumber(targetBalance);
                incomeEl.innerText = formatNumber(state.income);
                expensesEl.innerText = formatNumber(state.expenses);
                savingsEl.innerText = formatNumber(state.savings);
            }
        }

        // Render Transactions Table (to both containers)
        function renderTransactions() {
            const emptyHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                    </div>
                    <div class="empty-title">No transactions found</div>
                    <div style="font-size: 0.9rem;">Use the Smart Command below to add a transaction.</div>
                </div>
            `;

            if (state.transactions.length === 0) {
                dashTransactionsContainer.innerHTML = emptyHTML;
                fullTransactionsContainer.innerHTML = emptyHTML;
                return;
            }

            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Time</th>
                            <th>Status</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            state.transactions.forEach((tx, index) => {
                let amountClass = '';
                let sign = '';
                if (tx.type === 'income') { amountClass = 'amount-income'; sign = '+'; }
                else if (tx.type === 'expense') { amountClass = 'amount-expense'; sign = '-'; }
                else { amountClass = 'amount-savings'; sign = '+'; }

                const rowClass = index === 0 ? 'new-row' : '';

                tableHTML += `
                    <tr class="${rowClass}">
                        <td class="col-desc">
                            <div style="display: flex; align-items: center; gap: 0.8rem;">
                                <div style="width: 8px; height: 8px; border-radius: 50%; background: ${tx.type === 'expense' ? '#f87171' : (tx.type === 'income' ? '#4ade80' : '#60a5fa')}"></div>
                                ${tx.description}
                            </div>
                        </td>
                        <td class="col-cat">${tx.category}</td>
                        <td class="${amountClass}" style="font-weight: 500;">${sign}$${formatNumber(tx.amount)}</td>
                        <td class="col-time">${tx.time}</td>
                        <td>
                            <span class="badge">${tx.status}</span>
                        </td>
                        <td style="text-align: right;">
                            <button class="delete-icon clickable" onclick="confirmDeleteTransaction(${tx.id})" title="Delete Transaction">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                        </td>
                    </tr>
                `;
            });

            tableHTML += `
                    </tbody>
                </table>
            `;

            dashTransactionsContainer.innerHTML = tableHTML;
            fullTransactionsContainer.innerHTML = tableHTML;
        }

        let toastTimeout;
        // Show toast notification
        function showToast(message, isError = false) {
            clearTimeout(toastTimeout);
            toastMessage.innerText = message;

            if (isError) {
                toast.style.borderLeftColor = '#f87171';
            } else {
                toast.style.borderLeftColor = 'var(--secondary-accent)';
            }

            toast.classList.add('show');
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Better capitalization for description
        function capitalizeWords(str) {
            return str.replace(/\b\w/g, l => l.toUpperCase());
        }

        // Shared Logic to Apply a Transaction
        function applyTransaction(amount, type, categoryLabel, description) {
            if (type === 'income') state.income += amount;
            else if (type === 'expense') state.expenses += amount;
            else if (type === 'savings') state.savings += amount;

            const newTx = {
                id: Date.now(),
                description: description || categoryLabel,
                category: categoryLabel,
                amount: amount,
                type: type,
                time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }),
                status: 'Completed'
            };

            state.transactions.unshift(newTx);
            if (state.transactions.length > 20) state.transactions.pop();

            saveState();
            updateCards(true);
            renderTransactions();
            updateGoalDrawerUI();
            showToast("Transaction logged successfully");
        }

        // Parse Smart Command text
        function parseCommand(text) {
            const originalText = text;
            text = text.toLowerCase().trim();
            if (!text) return;

            const numberMatch = text.match(/\d+(\.\d+)?/);
            if (!numberMatch) {
                showToast("No amount detected in command.", true);
                commandInput.style.transform = "translateX(5px)";
                setTimeout(() => commandInput.style.transform = "translateX(-5px)", 100);
                setTimeout(() => commandInput.style.transform = "translateX(5px)", 200);
                setTimeout(() => commandInput.style.transform = "translateX(0)", 300);
                return;
            }

            const amount = parseFloat(numberMatch[0]);
            if (isNaN(amount)) return;

            let updated = false;
            let category = '';
            let type = '';

            if (text.includes('income')) {
                state.income += amount;
                category = 'Income';
                type = 'income';
                updated = true;
            } else if (text.includes('spent') || text.includes('expense')) {
                state.expenses += amount;
                category = 'Expense';
                type = 'expense';
                updated = true;
            } else if (text.includes('save') || text.includes('saving')) {
                state.savings += amount;
                category = 'Savings';
                type = 'savings';
                updated = true;
            }

            if (updated) {
                let desc = capitalizeWords(originalText);
                applyTransaction(amount, type, category, desc);
                commandInput.value = '';
            } else {
                showToast("Use keywords: 'income', 'spent', or 'save'", true);
            }
        }

        // Manual Entry Logic
        function selectManualCategory(type) {
            selectedManualCategory = type;

            // UI Toggle
            document.querySelectorAll('.manual-option').forEach(el => el.classList.remove('active'));
            document.querySelector(`.manual-option[data-type="${type}"]`).classList.add('active');

            manualForm.classList.add('show');
            manualAmount.focus();
        }

        function submitManualEntry() {
            const amount = parseFloat(manualAmount.value);
            const desc = manualDesc.value.trim();

            if (!selectedManualCategory) {
                showToast("Please select a category first.", true);
                return;
            }
            if (isNaN(amount) || amount <= 0) {
                showToast("Please enter a valid amount.", true);
                return;
            }

            let categoryLabel = '';
            if (selectedManualCategory === 'income') categoryLabel = 'Income';
            else if (selectedManualCategory === 'expense') categoryLabel = 'Expense';
            else categoryLabel = 'Savings';

            applyTransaction(amount, selectedManualCategory, categoryLabel, capitalizeWords(desc));

            // Reset manual form wrapper
            manualAmount.value = '';
            manualDesc.value = '';
            closeAllBubbles();
        }

        // Popups Toggle Logic
        function closeAllBubbles() {
            aiBubble.classList.remove('open');
            fabAI.classList.remove('active');

            manualBubble.classList.remove('open');
            fabManual.classList.remove('active');
            manualForm.classList.remove('show');

            document.querySelectorAll('.manual-option').forEach(el => el.classList.remove('active'));
            selectedManualCategory = null;
            commandInput.blur();
            manualAmount.blur();
        }

        function toggleAiBubble() {
            const isOpen = aiBubble.classList.contains('open');
            closeAllBubbles();
            if (!isOpen) {
                aiBubble.classList.add('open');
                fabAI.classList.add('active');
                setTimeout(() => commandInput.focus(), 300);
            }
        }

        function toggleManualBubble() {
            const isOpen = manualBubble.classList.contains('open');
            closeAllBubbles();
            if (!isOpen) {
                manualBubble.classList.add('open');
                fabManual.classList.add('active');
            }
        }

        // Navigation Logic (Unused but kept per original structure, driven by DOMContentLoaded)
        function switchView(view) {
            viewDashboard.classList.remove('active');
            viewTable.classList.remove('active');

            if (view === 'dashboard') {
                viewDashboard.classList.add('active');
                pageTitle.innerText = "Overview";
            } else if (view === 'transactions') {
                viewTable.classList.add('active');
                pageTitle.innerText = "All Transactions";
            }
        }

        // Confirm Modal Logic
        function showConfirmModal(title, message, callback) {
            document.getElementById('confirmTitle').innerText = title;
            document.getElementById('confirmMessage').innerText = message;
            document.getElementById('confirmModal').classList.add('active');
            pendingConfirmAction = callback;
        }

        function hideConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
            pendingConfirmAction = null;
        }

        const cancelBtn = document.getElementById('confirmCancelBtn');
        const deleteBtn = document.getElementById('confirmDeleteBtn');

        if (cancelBtn) {
            cancelBtn.addEventListener('click', hideConfirmModal);
        }

        if (deleteBtn) {
            deleteBtn.addEventListener('click', () => {
                if (pendingConfirmAction) pendingConfirmAction();
                hideConfirmModal();
            });
        }

        // Transaction Delete Logic
        function confirmDeleteTransaction(id) {
            const tx = state.transactions.find(t => t.id === id);
            if (!tx) return;
            showConfirmModal('Delete Transaction', `Are you sure you want to delete '${tx.description}'?`, () => {
                if (tx.type === 'income') state.income -= tx.amount;
                else if (tx.type === 'expense') state.expenses -= tx.amount;
                else if (tx.type === 'savings') state.savings -= tx.amount;

                state.transactions = state.transactions.filter(t => t.id !== id);
                saveState();
                updateCards(true);
                renderTransactions();
                updateGoalDrawerUI();
                showToast("Transaction deleted.");
            });
        }

        // Drawer Logic
        function updateGoalDrawerUI() {
            if (!state.goals || state.goals.length === 0) {
                goalListContainer.innerHTML = `<div style="color: var(--text-muted); text-align: center; padding: 2rem 0;">No goals yet.<br>Click 'Add New Goal' to start saving!</div>`;
                return;
            }

            let html = '';
            const saved = state.savings || 0;

            state.goals.forEach(goal => {
                let percent = Math.min(Math.round((saved / goal.target) * 100), 100);
                if (isNaN(percent)) percent = 0;

                html += `
                    <div class="goal-card">
                        <div class="goal-card-header">
                            <span class="goal-card-title">${goal.name}</span>
                            <button class="delete-icon clickable" onclick="confirmDeleteGoal(${goal.id}, '${goal.name.replace(/'/g, "\\'")}')" title="Delete Goal">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                        </div>
                        <div class="goal-progress-container" style="margin-top: 0; padding: 0.8rem; background: rgba(0,0,0,0.2); border: none;">
                            <div class="progress-text">
                                <span>Progress</span>
                                <span>${percent}%</span>
                            </div>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: ${percent}%"></div>
                            </div>
                            <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem; display: flex; justify-content: space-between;">
                                <span>${goal.date ? 'Target: ' + goal.date : ''}</span>
                                <span>$${formatNumber(saved)} / $${formatNumber(goal.target)}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            goalListContainer.innerHTML = html;
        }

        function confirmDeleteGoal(id, name) {
            showConfirmModal('Delete Goal', `Are you sure you want to delete '${name}'?`, () => {
                state.goals = state.goals.filter(g => g.id !== id);
                saveState();
                updateGoalDrawerUI();
                showToast("Goal deleted.");
            });
        }

        function toggleGoalDrawer() {
            // Replaced by hard reset DOMContentLoaded logic
        }

        // Close bubble when clicking outside
        function closeOutsideClick(e) {
            const aiBtn = e.target.closest('#fabAI');
            const manualBtn = e.target.closest('#fabManual');
            const isInsideAiBubble = e.target.closest('#aiBubble');
            const isInsideManualBubble = e.target.closest('#manualBubble');

            if (!aiBtn && !isInsideAiBubble && !manualBtn && !isInsideManualBubble) {
                closeAllBubbles();
            }
        }

        // Event Listeners for UI elements
        document.addEventListener('click', (e) => {
            closeOutsideClick(e);
        });

        commandInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                parseCommand(commandInput.value);
                closeAllBubbles();
            }
        });

        manualAmount.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitManualEntry();
        });

        manualDesc.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitManualEntry();
        });

        resetBtn.addEventListener('click', () => {
            if (confirm('Clear all dashboard data and transactions?')) {
                state = { income: 0, expenses: 0, savings: 0, transactions: [], goals: [] };
                saveState();
                updateCards(true);
                renderTransactions();
                updateGoalDrawerUI();
                commandInput.value = '';
                showToast("All data has been reset.");
            }
        });

        // Initialize
        loadState();

        // Hard Reset Listeners explicitly as requested
        function initializeUIButtons() {
            const btnDashboard = document.getElementById('btn-dashboard');
            const btnTransactions = document.getElementById('btn-transactions');
            const btnGoals = document.getElementById('btn-goals');
            const sideGoalDrawer = document.getElementById('goal-drawer');
            const closeBtn = document.getElementById('closeDrawerBtn');
            const viewDash = document.getElementById('viewDashboard');
            const viewTab = document.getElementById('viewTable');
            const pageTitleEl = document.getElementById('pageTitle');

            const fabAIManual = document.getElementById('fabAI');
            const fabManualBtn = document.getElementById('fabManual');

            const btnShowAddGoal = document.getElementById('showAddGoalBtn');
            const btnCancelAddGoal = document.getElementById('cancelAddGoalBtn');
            const btnSaveNewGoal = document.getElementById('saveNewGoalBtn');
            const addGoalModal = document.getElementById('addGoalModal');
            const inputGoalName = document.getElementById('newGoalName');
            const inputGoalTarget = document.getElementById('newGoalTarget');
            const inputGoalDate = document.getElementById('newGoalDate');

            if (fabAIManual) {
                fabAIManual.onclick = (e) => {
                    e.stopPropagation();
                    toggleAiBubble();
                };
            }

            if (fabManualBtn) {
                fabManualBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleManualBubble();
                };
            }

            if (btnShowAddGoal && addGoalModal) {
                btnShowAddGoal.onclick = () => {
                    addGoalModal.classList.add('active');
                    if (inputGoalName) inputGoalName.focus();
                };
            }

            if (btnCancelAddGoal && addGoalModal) {
                btnCancelAddGoal.onclick = () => {
                    addGoalModal.classList.remove('active');
                    if (inputGoalName) inputGoalName.value = '';
                    if (inputGoalTarget) inputGoalTarget.value = '';
                    if (inputGoalDate) inputGoalDate.value = '';
                };
            }

            if (btnSaveNewGoal && addGoalModal) {
                btnSaveNewGoal.onclick = () => {
                    const name = inputGoalName ? inputGoalName.value.trim() : '';
                    const target = inputGoalTarget ? parseFloat(inputGoalTarget.value) : 0;
                    const targetDate = inputGoalDate ? inputGoalDate.value : '';

                    const finalName = name || 'New Goal';
                    const finalTarget = isNaN(target) || target <= 0 ? 1000 : target;

                    state.goals.push({ id: Date.now(), name: finalName, target: finalTarget, date: targetDate });
                    saveState();
                    updateGoalDrawerUI();
                    showToast("Goal created!");

                    addGoalModal.classList.remove('active');
                    if (inputGoalName) inputGoalName.value = '';
                    if (inputGoalTarget) inputGoalTarget.value = '';
                    if (inputGoalDate) inputGoalDate.value = '';
                };
            }

            if (btnGoals && sideGoalDrawer) {
                btnGoals.onclick = () => {
                    sideGoalDrawer.style.right = '0';
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    btnGoals.classList.add('active');
                };
            }

            if (closeBtn && sideGoalDrawer) {
                closeBtn.onclick = () => {
                    sideGoalDrawer.style.right = '-400px';
                };
            }

            if (btnTransactions && viewDash && viewTab) {
                btnTransactions.onclick = () => {
                    viewDash.style.display = 'none';
                    viewTab.style.display = 'block';
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    btnTransactions.classList.add('active');
                    if (pageTitleEl) pageTitleEl.innerText = "All Transactions";
                };
            }

            if (btnDashboard && viewDash && viewTab) {
                btnDashboard.onclick = () => {
                    viewDash.style.display = 'block';
                    viewTab.style.display = 'block';
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    btnDashboard.classList.add('active');
                    if (pageTitleEl) pageTitleEl.innerText = "Overview";
                };
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeUIButtons);
        } else {
            initializeUIButtons();
        }
    </script>
    <div class="confirm-modal-overlay" id="confirmModal">
        <div class="confirm-modal-content">
            <h3 class="confirm-title" id="confirmTitle">Are you sure?</h3>
            <p class="confirm-message" id="confirmMessage">This action cannot be undone.</p>
            <div class="confirm-actions">
                <button class="confirm-btn cancel-btn clickable" id="confirmCancelBtn">Cancel</button>
                <button class="confirm-btn delete-btn clickable" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <!-- Add Goal Modal -->
    <div class="confirm-modal-overlay" id="addGoalModal">
        <div class="confirm-modal-content" style="text-align: left;">
            <div class="drawer-header" style="margin-bottom: 2rem; justify-content: center;">
                <span class="drawer-title" style="font-size: 1.4rem;">Add New Goal</span>
            </div>
            <div class="add-goal-form"
                style="display: flex; background: transparent; padding: 0; border: none; margin-top: 0; box-shadow: none; animation: none;">
                <div class="goal-input-group">
                    <label class="goal-label">Goal Name</label>
                    <input type="text" id="newGoalName" class="goal-input" placeholder="e.g. New Car">
                </div>
                <div class="goal-input-group">
                    <label class="goal-label">Target Amount ($)</label>
                    <input type="number" id="newGoalTarget" class="goal-input" placeholder="10000">
                </div>
                <div class="goal-input-group">
                    <label class="goal-label">Target Date</label>
                    <input type="date" id="newGoalDate" class="goal-input" style="color-scheme: dark;">
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button class="confirm-btn cancel-btn clickable" id="cancelAddGoalBtn">Cancel</button>
                    <button class="confirm-btn clickable" id="saveNewGoalBtn"
                        style="background: var(--primary-accent); border: 1px solid var(--secondary-accent); color: white;">Save
                        Goal</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
